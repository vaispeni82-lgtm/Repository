name: Build Mod
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download missing Gradle files
        run: |
          curl -LO https://raw.githubusercontent.com/FabricMC/fabric-example-mod/1.20/gradlew
          chmod +x gradlew
          mkdir -p gradle/wrapper
          curl -L -o gradle/wrapper/gradle-wrapper.properties https://raw.githubusercontent.com/FabricMC/fabric-example-mod/1.20/gradle/wrapper/gradle-wrapper.properties
          curl -L -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/FabricMC/fabric-example-mod/1.20/gradle/wrapper/gradle-wrapper.jar
          if [ ! -f build.gradle ]; then
            curl -LO https://raw.githubusercontent.com/FabricMC/fabric-example-mod/1.20/build.gradle
          fi
          if [ ! -f settings.gradle ]; then
            curl -LO https://raw.githubusercontent.com/FabricMC/fabric-example-mod/1.20/settings.gradle
          fi

      - name: Build with Gradle
        run: ./gradlew build
        
      - name: Upload Mod Jar
        uses: actions/upload-artifact@v3
        with:
          name: Mod-Jar
          path: build/libs/*.jar
          
