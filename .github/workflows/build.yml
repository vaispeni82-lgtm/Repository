name: Build Mod
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Gradle
        run: |
          curl -LO https://raw.githubusercontent.com/FabricMC/fabric-example-mod/1.20/gradlew
          chmod +x gradlew
      - name: Build
        run: ./gradlew build
  
