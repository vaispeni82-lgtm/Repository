name: Build Mod
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Fix Directories
        run: |
          mkdir -p src/main/java/net/fabricmc/example/
          if [ -f src/main/ServerMenuScreen.java ]; then
            mv src/main/ServerMenuScreen.java src/main/java/net/fabricmc/example/ServerMenuScreen.java
          fi
      - run: chmod +x gradlew && ./gradlew build
      - uses: actions/upload-artifact@v3
        with:
          name: Mod-Jar
          path: build/libs/*.jar
          
